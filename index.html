<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALI SMART CITY NETWORK MAP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; color: #0f0; font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; }
        
        /* Matrix Background */
        #matrix-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.1; }

        /* Layout */
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* Map Theme */
        .leaflet-container { background: #000; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(0.8) contrast(1.1); }
        .leaflet-popup-content-wrapper { background: rgba(0,20,0,0.95); color: #0f0; border: 1px solid #0f0; }
        .leaflet-popup-tip { background: #0f0; }
        .leaflet-popup-content { margin: 10px 15px; font-family: monospace; }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0;
            width: 300px; height: calc(100vh - 40px); display: flex;
            flex-direction: column; box-shadow: 0 0 30px rgba(0,255,0,0.1);
        }
        .header-box { padding: 15px; border-bottom: 1px solid #0f0; text-align: center; }
        .header-box h2 { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .status-info { padding: 15px; border-bottom: 1px solid #333; font-size: 0.8rem; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .lbl { color: #888; }
        .val { color: #0ff; font-weight: bold; }

        .controls { padding: 15px; border-bottom: 1px solid #333; }
        .btn-main {
            width: 100%; padding: 10px; background: #000; border: 1px solid #0f0;
            color: #0f0; font-weight: bold; cursor: pointer; margin-bottom: 10px;
            transition: 0.2s; text-transform: uppercase;
        }
        .btn-main:hover { background: #0f0; color: #000; }
        .btn-main:disabled { border-color: #333; color: #333; }

        /* Area Daftar Jaringan yang Bisa Disambungkan */
        .connect-list-box { flex-grow: 1; padding: 15px; overflow-y: auto; }
        .list-title { color: #ff0; font-size: 0.9rem; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        
        .net-item {
            background: rgba(255, 255, 0, 0.05); border: 1px solid #555;
            padding: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .net-item:hover { border-color: #ff0; background: rgba(255, 255, 0, 0.1); }
        .net-name { color: #fff; font-weight: bold; font-size: 0.9rem; }
        .net-meta { color: #888; font-size: 0.7rem; margin-top: 4px; }

        /* Custom Markers */
        .marker-container { display: flex; flex-direction: column; align-items: center; }
        .pin {
            width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff;
            box-shadow: 0 0 5px currentColor;
        }
        .pin.secure { background: #0f0; color: #0f0; } /* Hijau = Secure */
        .pin.open { background: #ff0; color: #ff0; } /* Kuning = Open/Connectable */
        
        .pin-label {
            background: rgba(0,0,0,0.8); color: #fff; padding: 2px 5px;
            border-radius: 2px; font-size: 10px; margin-top: 2px;
            white-space: nowrap; border: 1px solid #333;
        }

        /* Modal */
        #modal-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        #modal-box {
            width: 90%; max-width: 500px; background: #000; border: 2px solid #0f0;
            padding: 20px; position: relative;
        }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #f00; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        .status-badge { display: inline-block; padding: 3px 8px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; }
        .status-badge.open { background: #ff0; color: #000; }
        .status-badge.secure { background: #333; color: #0f0; border: 1px solid #0f0; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .d-box { background: #111; padding: 8px; border-left: 2px solid #0f0; }
        .d-lbl { font-size: 0.7rem; color: #666; }
        .d-vl { font-size: 0.9rem; color: #fff; font-weight: bold; }
        
        .btn-connect {
            width: 100%; padding: 12px; background: #0f0; color: #000;
            border: none; font-weight: bold; cursor: pointer; font-size: 1rem; text-transform: uppercase;
        }
        .btn-connect:disabled { background: #333; color: #666; pointer-events: none; }

        /* Console */
        #console {
            position: fixed; bottom: 0; left: 340px; right: 20px; height: 30px;
            background: #000; border-top: 1px solid #333; z-index: 999;
            font-size: 0.7rem; color: #888; padding: 5px 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div id="map"></div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="header-box">
            <h2>📍 Bali Ops Center</h2>
        </div>
        
        <div class="status-info">
            <div class="row">
                <span class="lbl">Your Status:</span>
                <span class="val" id="s-mode">STANDBY</span>
            </div>
            <div class="row">
                <span class="lbl">Location:</span>
                <span class="val" id="s-loc">Acquiring...</span>
            </div>
            <div class="row">
                <span class="lbl">Accuracy:</span>
                <span class="val" id="s-acc">-</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-main" onclick="scanBali()">🔍 SCAN BALI AREA</button>
            <button class="btn-main" onclick="locateMe()" style="border-color:#555; color:#555;">📍 MY LOCATION</button>
        </div>

        <div class="connect-list-box">
            <div class="list-title">🔓 CONNECTABLE NETWORKS (OPEN)</div>
            <div id="open-list" style="font-size:0.8rem; color:#555;">
                Scan to find open networks...
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay">
        <div id="modal-box">
            <span class="close-btn" onclick="closeModal()">✕</span>
            <div style="font-size:0.8rem; color:#888;">TARGET IDENTIFIED</div>
            <h2 style="margin:5px 0;" id="m-name">SSID</h2>
            <div id="m-badge" class="status-badge">STATUS</div>
            
            <div class="data-grid">
                <div class="d-box"><div class="d-lbl">MAC ADDR</div><div class="d-vl" id="m-mac">-</div></div>
                <div class="d-box"><div class="d-lbl">SIGNAL</div><div class="d-vl" id="m-sig">-</div></div>
                <div class="d-box"><div class="d-lbl">FREQ/CH</div><div class="d-vl" id="m-chan">-</div></div>
                <div class="d-box"><div class="d-lbl">PASSWORD</div><div class="d-vl" id="m-pass" style="color:#ff0;">-</div></div>
            </div>

            <button class="btn-connect" id="btn-conn" onclick="attemptConnect()">🔌 CONNECT</button>
            <div id="conn-log" style="margin-top:10px; font-size:0.8rem; display:none; border-top:1px solid #333; padding-top:10px;"></div>
        </div>
    </div>

    <div id="console">> System Ready...</div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script>
        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        let drops = []; for(let i=0; i<(canvas.width/20); i++) drops[i] = 1;
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
            for(let i = 0; i < drops.length; i++) {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 20, drops[i] * 20);
                if(drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- MAP SETUP BALI ---
        const baliCenter = [-8.4095, 115.1889];
        const map = L.map('map', { center: baliCenter, zoom: 10, zoomControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '' }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let userMarker = null;
        let wifiLayer = L.layerGroup().addTo(map);
        let currentTarget = null;

        // --- 1. REALTIME GPS TRACKING ---
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(updatePos, errPos, { enableHighAccuracy: true });
        }

        function updatePos(p) {
            const lat = p.coords.latitude;
            const lon = p.coords.longitude;
            const acc = p.coords.accuracy;

            document.getElementById('s-loc').innerText = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
            document.getElementById('s-acc').innerText = Math.round(acc) + "m";
            document.getElementById('s-mode').innerText = "LIVE TRACKING";
            document.getElementById('s-mode').style.color = "#0f0";

            if (!userMarker) {
                const icon = L.divIcon({ className: 'user-div', html: `<div style="width:15px; height:15px; background:#0096ff; border:2px solid #fff; border-radius:50%; box-shadow: 0 0 10px #0096ff;"></div>` });
                userMarker = L.marker([lat, lon], { icon: icon }).addTo(map);
                map.setView([lat, lon], 14);
            } else {
                userMarker.setLatLng([lat, lon]);
            }
        }

        function errPos(e) {
            document.getElementById('s-loc').innerText = "Permission Denied";
        }

        function locateMe() {
            if (userMarker) map.setView(userMarker.getLatLng(), 16);
            else alert("Lokasi tidak terdeteksi.");
        }

        // --- 2. BALI CLUSTER WIFI GENERATOR ---
        function scanBali() {
            wifiLayer.clearLayers();
            document.getElementById('open-list').innerHTML = "";
            log("Scanning Bali sectors...");

            // Definisikan Area Kota di Bali (Cluster Zone)
            const zones = [
                { name: "Denpasar", coord: [-8.6705, 115.2126] },
                { name: "Kuta", coord: [-8.7180, 115.1686] },
                { name: "Ubud", coord: [-8.5069, 115.2625] },
                { name: "Seminyak", coord: [-8.6908, 115.1563] },
                { name: "Sanur", coord: [-8.7050, 115.2610] },
                { name: "Canggu", coord: [-8.6475, 115.1375] },
                { name: "Gianyar", coord: [-8.5667, 115.3167] },
                { name: "Nusa Dua", coord: [-8.8019, 115.2375] }
            ];

            const prefixes = ["IndiHome", "MyRepublic", "FirstMedia", "Biznet", "Hotel_Guest", "Villa_Kita", "Cafe_Life", "CoWorking", "CCTV", "Linksys"];
            let openCount = 0;

            // Generate 20 titik per zona kota
            zones.forEach(zone => {
                for (let i = 0; i < 20; i++) {
                    // Sebar titik secara acak di sekitar pusat kota (radius kecil agar realistis)
                    const lat = zone.coord[0] + (Math.random() - 0.5) * 0.015;
                    const lon = zone.coord[1] + (Math.random() - 0.5) * 0.015;
                    
                    const isOpen = Math.random() > 0.7; // 30% Open
                    const ssid = `${prefixes[Math.floor(Math.random() * prefixes.length)]}_${zone.name.substring(0,3)}${Math.floor(Math.random()*50)}`;
                    
                    const data = {
                        ssid: ssid,
                        lat: lat, lon: lon,
                        mac: genMac(),
                        signal: Math.floor(Math.random() * 60) + 40,
                        channel: Math.floor(Math.random() * 14) + 1,
                        isOpen: isOpen,
                        pass: isOpen ? "OPEN" : genPass()
                    };

                    createMarker(data);

                    // Jika Open, masukkan ke daftar sidebar
                    if (isOpen) {
                        openCount++;
                        const item = document.createElement('div');
                        item.className = 'net-item';
                        item.innerHTML = `<div class="net-name">🔓 ${data.ssid}</div><div class="net-meta">Signal: ${data.signal}% | Loc: ${zone.name}</div>`;
                        item.onclick = () => { map.setView([data.lat, data.lon], 17); openModal(data); };
                        document.getElementById('open-list').appendChild(item);
                    }
                }
            });

            log(`Found ${openCount} open networks.`);
        }

        function createMarker(data) {
            // Custom Icon dengan Nama
            const iconHtml = `
                <div class="marker-container">
                    <div class="pin ${data.isOpen ? 'open' : 'secure'}"></div>
                    <div class="pin-label">${data.ssid.substring(0, 15)}</div>
                </div>
            `;
            const icon = L.divIcon({ html: iconHtml, className: '', iconSize: [100, 40], iconAnchor: [50, 15] });

            const marker = L.marker([data.lat, data.lon], { icon: icon }).addTo(wifiLayer);
            marker.on('click', () => openModal(data));
        }

        // --- 3. CONNECT LOGIC ---
        function openModal(data) {
            currentTarget = data;
            document.getElementById('m-name').innerText = data.ssid;
            document.getElementById('m-mac').innerText = data.mac;
            document.getElementById('m-sig').innerText = data.signal + "%";
            document.getElementById('m-chan').innerText = `Ch ${data.channel} (2.4GHz)`;
            document.getElementById('m-pass').innerText = data.pass;
            
            const badge = document.getElementById('m-badge');
            if(data.isOpen) {
                badge.innerText = "OPEN NETWORK";
                badge.className = "status-badge open";
            } else {
                badge.innerText = "SECURED";
                badge.className = "status-badge secure";
            }

            // Reset tombol
            const btn = document.getElementById('btn-conn');
            btn.disabled = false;
            btn.innerText = "🔌 CONNECT";
            btn.style.background = "#0f0";
            btn.style.color = "#000";
            document.getElementById('conn-log').style.display = 'none';

            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function attemptConnect() {
            const btn = document.getElementById('btn-conn');
            const log = document.getElementById('conn-log');
            
            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            log.style.display = 'block';
            log.innerHTML = "";

            const steps = ["Authenticating...", "DHCP Request...", "Assigned IP", data.isOpen ? "CONNECTED!" : "HANDSHAKE FAILED (Wrong Key)"];
            let t = 0;
            
            steps.forEach((s, i) => {
                setTimeout(() => {
                    log.innerHTML += `<div style="color:${i==3 ? '#0f0' : '#fff'}">> ${s}</div>`;
                    if(i==3) {
                        btn.innerText = data.isOpen ? "✅ CONNECTED" : "❌ FAILED";
                        btn.style.background = data.isOpen ? "#fff" : "#f00";
                    }
                }, t);
                t += 800;
            });
        }

        // Helpers
        function genMac() {
            return 'XX:XX:XX:XX:XX:XX'.replace(/X/g, () => "0123456789ABCDEF".charAt(Math.floor(Math.random() * 16)));
        }
        function genPass() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
            let p = "";
            for(let i=0; i<10; i++) p += c.charAt(Math.floor(Math.random() * c.length));
            return p;
        }
        function log(msg) {
            const c = document.getElementById('console');
            c.innerText = `> ${msg}`;
        }
    </script>
</body>
</html>
