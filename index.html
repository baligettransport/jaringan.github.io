<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALI ISLAND NETWORK SURVEILLANCE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; color: #0f0; font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; }
        
        /* Background Matrix */
        #matrix-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index: -1; opacity: 0.1; }

        /* Layout Peta Penuh */
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* Custom Map Style (Dark Mode) */
        .leaflet-container { background: #000; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(0.8) contrast(1.2); }
        
        /* Label Nama di Peta */
        .wifi-label {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #0f0;
            border-radius: 3px;
            padding: 2px 5px;
            color: #0f0;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 0 5px rgba(0,255,0,0.3);
        }
        .wifi-label.open { border-color: #ff0; color: #ff0; }

        /* User Marker Pulse */
        .user-pulse {
            width: 20px; height: 20px; background: rgba(0, 150, 255, 0.5);
            border-radius: 50%; animation: pulse-anim 2s infinite;
        }
        @keyframes pulse-anim {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Sidebar Control */
        #control-panel {
            position: fixed; top: 20px; left: 50px; z-index: 1000;
            background: rgba(0, 20, 0, 0.9); border: 1px solid #0f0; padding: 15px;
            width: 280px; box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        .panel-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #0f0; padding-bottom: 5px; }
        .status-row { margin-bottom: 8px; font-size: 0.8rem; }
        .status-label { color: #888; }
        .status-val { color: #fff; float: right; }
        
        .btn-scan {
            width: 100%; margin-top: 10px; background: #000; border: 1px solid #0f0;
            color: #0f0; padding: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-scan:hover { background: #0f0; color: #000; }
        .btn-loc {
            width: 100%; margin-top: 5px; background: #000; border: 1px solid #555;
            color: #555; padding: 8px; cursor: pointer;
        }
        .btn-loc:hover { border-color: #0ff; color: #0ff; }

        /* Modal Detail */
        #modal-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        #modal-box {
            width: 90%; max-width: 500px; background: #000; border: 2px solid #0f0;
            padding: 20px; position: relative; box-shadow: 0 0 50px rgba(0,255,0,0.2);
        }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #f00; cursor: pointer; font-weight: bold; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .d-box { background: #111; padding: 8px; border-left: 2px solid #0f0; }
        .d-lbl { font-size: 0.7rem; color: #666; }
        .d-vl { font-size: 0.9rem; color: #fff; font-weight: bold; }
        
        .btn-connect {
            width: 100%; margin-top: 15px; padding: 10px; background: #0f0; color: #000;
            border: none; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-connect:disabled { background: #333; color: #666; }

        /* Log Console Mini */
        #console-log {
            position: fixed; bottom: 10px; left: 50px; width: 280px; height: 100px;
            background: rgba(0,0,0,0.8); border: 1px solid #333; z-index: 1000;
            padding: 10px; font-size: 0.7rem; overflow-y: auto;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div id="map"></div>

    <!-- Control Panel -->
    <div id="control-panel">
        <div class="panel-title">📍 BALI NETWORK OPS</div>
        <div class="status-row">
            <span class="status-label">Status:</span>
            <span class="status-val" id="s-status">STANDBY</span>
        </div>
        <div class="status-row">
            <span class="status-label">Lokasi Anda:</span>
            <span class="status-val" id="s-loc">Searching...</span>
        </div>
        <div class="status-row">
            <span class="status-label">Nodes Found:</span>
            <span class="status-val" id="s-nodes">0</span>
        </div>
        <div class="status-row">
            <span class="status-label">Accuracy:</span>
            <span class="status-val" id="s-acc">-</span>
        </div>

        <button class="btn-scan" onclick="loadBaliNetworks()">🔍 SCAN BALI AREA</button>
        <button class="btn-loc" onclick="centerToUser()">📍 MY LOCATION</button>
    </div>

    <!-- Console Log -->
    <div id="console-log">
        <div>> System Ready...</div>
    </div>

    <!-- Modal Detail -->
    <div id="modal-overlay">
        <div id="modal-box">
            <span class="close-btn" onclick="document.getElementById('modal-overlay').style.display='none'">✕</span>
            <div style="font-size:0.8rem; color:#888;">TARGET NETWORK</div>
            <h2 style="margin:5px 0 15px 0; color:#fff;" id="m-name">SSID NAME</h2>
            
            <div class="data-grid">
                <div class="d-box"><div class="d-lbl">MAC ADDRESS</div><div class="d-vl" id="m-mac">-</div></div>
                <div class="d-box"><div class="d-lbl">SIGNAL</div><div class="d-vl" id="m-sig">-</div></div>
                <div class="d-box"><div class="d-lbl">CHANNEL</div><div class="d-vl" id="m-chan">-</div></div>
                <div class="d-box"><div class="d-lbl">ENCRYPTION</div><div class="d-vl" id="m-enc">-</div></div>
                <div class="d-box"><div class="d-lbl">IP ADDRESS</div><div class="d-vl" id="m-ip">-</div></div>
                <div class="d-box"><div class="d-lbl">PASSWORD</div><div class="d-vl" id="m-pass" style="color:#ff0;">-</div></div>
            </div>

            <button class="btn-connect" id="btn-conn" onclick="connectSim()">🔌 SAMBUNGKAN</button>
            <div id="conn-log" style="display:none; margin-top:10px; font-size:0.8rem; color:#0f0;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script>
        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);
        let drops = []; for(let i=0; i<(canvas.width/20); i++) drops[i] = 1;
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
            for(let i = 0; i < drops.length; i++) {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 20, drops[i] * 20);
                if(drops[i] * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- 1. SETUP PETA BALI ---
        // Koordinat tengah Pulau Bali
        const baliCenter = [-8.4095, 115.1889]; 
        const map = L.map('map', {
            center: baliCenter,
            zoom: 11, // Zoom level pas untuk melihat seluruh pulau
            zoomControl: false
        });

        // Load Tile (Peta)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'CyberMap'
        }).addTo(map);

        // Tambah Zoom Control manual di kanan bawah
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let userMarker = null;
        let networkLayer = L.layerGroup().addTo(map);
        let currentTarget = null;

        // --- 2. REALTIME GPS TRACKING (ANDA) ---
        function trackUser() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePosition, handleError, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                });
            } else {
                log("Browser tidak support GPS");
            }
        }

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const acc = position.coords.accuracy;

            document.getElementById('s-loc').innerText = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
            document.getElementById('s-acc').innerText = Math.round(acc) + "m";
            document.getElementById('s-status').innerText = "TRACKING";
            document.getElementById('s-status').style.color = "#0f0";

            // Update Marker User
            if (userMarker) {
                userMarker.setLatLng([lat, lon]);
            } else {
                // Ikon User
                const userIcon = L.divIcon({
                    className: 'user-div-icon',
                    html: `<div class="user-pulse"></div><div style="position:absolute;top:0;left:0;width:20px;height:20px;background:#0096ff;border:2px solid #fff;border-radius:50%;"></div>`,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                userMarker = L.marker([lat, lon], { icon: userIcon }).addTo(map);
                userMarker.bindPopup("<b>POSISI ANDA</b><br>Lokasi Realtime").openPopup();
                
                // Auto center pertama kali
                map.setView([lat, lon], 15);
            }
        }

        function handleError(error) {
            log("Error GPS: " + error.message);
            document.getElementById('s-status').innerText = "GPS DENIED";
        }

        function centerToUser() {
            if(userMarker) {
                map.setView(userMarker.getLatLng(), 16);
            } else {
                alert("Lokasi Anda belum terdeteksi. Izinkan akses lokasi di browser.");
            }
        }

        // --- 3. GENERATE WIFI DI SELURUH BALI ---
        function loadBaliNetworks() {
            networkLayer.clearLayers();
            log("Scanning Bali Island...");
            
            const providers = ["IndiHome", "MyRepublic", "FirstMedia", "Telkomsel", "XL_PRI", "Smartfren", "Bali_Wifi", "Villa_Guest", "Cafe_Net", "Homestay"];
            let count = 0;

            // Membuat titik acak di sekitar pusat Bali (Radius besar)
            for(let i=0; i<150; i++) { // 150 Titik
                const lat = -8.4095 + (Math.random() - 0.5) * 0.8; // Menyebar lintang
                const lon = 115.1889 + (Math.random() - 0.5) * 1.0; // Menyebar bujur
                
                const name = providers[Math.floor(Math.random()*providers.length)] + "_" + Math.floor(Math.random()*100);
                const isOpen = Math.random() > 0.7;
                
                const data = {
                    ssid: name,
                    lat: lat,
                    lon: lon,
                    mac: generateMac(),
                    signal: Math.floor(Math.random()*70) + 30,
                    channel: Math.floor(Math.random()*14)+1,
                    isSecure: !isOpen,
                    ip: `192.168.${Math.floor(Math.random()*254)}.${Math.floor(Math.random()*254)}`,
                    pass: !isOpen ? generatePass() : "OPEN"
                };

                // Buat Marker dengan Label Nama
                const icon = L.divIcon({
                    className: 'wifi-icon',
                    html: `<div style="display:flex; flex-direction:column; align-items:center;">
                              <div style="width:8px; height:8px; border-radius:50%; background:${data.isSecure ? '#0f0' : '#ff0'}; border:1px solid #fff;"></div>
                              <div class="wifi-label ${isOpen ? 'open' : ''}">${data.ssid}</div>
                           </div>`,
                    iconSize: [100, 40],
                    iconAnchor: [50, 10]
                });

                const marker = L.marker([lat, lon], {icon: icon}).addTo(networkLayer);
                
                // Event Klik
                marker.on('click', () => openDetail(data));
                count++;
            }
            
            document.getElementById('s-nodes').innerText = count;
            log("Found " + count + " nodes.");
        }

        // --- 4. MODAL & CONNECT LOGIC ---
        function openDetail(data) {
            currentTarget = data;
            document.getElementById('m-name').innerText = data.ssid;
            document.getElementById('m-mac').innerText = data.mac;
            document.getElementById('m-sig').innerText = data.signal + "%";
            document.getElementById('m-chan').innerText = "CH " + data.channel;
            document.getElementById('m-enc').innerText = data.isSecure ? "WPA2" : "OPEN";
            document.getElementById('m-ip').innerText = data.ip;
            document.getElementById('m-pass').innerText = data.pass;
            
            document.getElementById('btn-conn').disabled = false;
            document.getElementById('btn-conn').innerText = "🔌 SAMBUNGKAN";
            document.getElementById('btn-conn').style.background = "#0f0";
            document.getElementById('btn-conn').style.color = "#000";
            document.getElementById('conn-log').style.display = 'none';
            
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function connectSim() {
            const btn = document.getElementById('btn-conn');
            const log = document.getElementById('conn-log');
            btn.disabled = true;
            btn.innerText = "Connecting...";
            log.style.display = 'block';
            log.innerHTML = "";

            const steps = ["Handshaking...", "Authenticating...", "Obtaining IP...", "Connected!"];
            let time = 0;
            
            steps.forEach((step, i) => {
                setTimeout(() => {
                    log.innerHTML += `<div style="color:${i==3 ? '#0f0' : '#fff'}">> ${step}</div>`;
                    if(i==3) {
                        btn.innerText = "✅ CONNECTED";
                        btn.style.background = "#fff";
                    }
                }, time);
                time += 800;
            });
        }

        // Helpers
        function generateMac() {
            return 'XX:XX:XX:XX:XX:XX'.replace(/X/g, () => "0123456789ABCDEF".charAt(Math.floor(Math.random() * 16)));
        }
        function generatePass() {
            const c = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
            let p = "";
            for(let i=0; i<10; i++) p += c.charAt(Math.floor(Math.random() * c.length));
            return p;
        }
        function log(msg) {
            const con = document.getElementById('console-log');
            const time = new Date().toLocaleTimeString();
            con.innerHTML += `<div>[${time}] ${msg}</div>`;
            con.scrollTop = con.scrollHeight;
        }

        // Init
        trackUser(); // Jalankan tracking lokasi
    </script>
</body>
</html>
